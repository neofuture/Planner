<!DOCTYPE html>
<html>
<body style="margin:0;background:#222;color:#0f0;font-family:monospace;font-size:13px">
<div style="padding:20px">
  <div id="status" style="color:#ff0;font-size:22px;font-weight:bold">Click the box to start</div>
  <div id="timer" style="color:#aaa;font-size:16px;margin:6px 0 12px 0"></div>
  <canvas id="canvas" width="1200" height="300" style="background:#111;border:1px solid #333;display:block;margin-bottom:12px"></canvas>
  <div id="btnRow" style="padding:10px 0">
    <button id="copyBtn" style="display:none;padding:10px 20px;font-size:16px;margin:5px;cursor:pointer;background:#07f;color:#fff;border:none">Copy Full Log + Analysis</button>
    <button id="resetBtn" style="display:none;padding:10px 20px;font-size:16px;margin:5px;cursor:pointer;background:#a00;color:#fff;border:none">Reset</button>
  </div>
  <pre id="analysis" style="color:#0f0;font-size:13px;max-height:60vh;overflow:auto;background:#111;padding:15px;display:none;border:1px solid #333"></pre>
</div>
<script>
var statusEl = document.getElementById('status');
var timerEl = document.getElementById('timer');
var canvas = document.getElementById('canvas');
var ctx = canvas.getContext('2d');
var copyBtn = document.getElementById('copyBtn');
var resetBtn = document.getElementById('resetBtn');
var analysisEl = document.getElementById('analysis');

var PHASE1_MS = 10000;
var PHASE2_MS = 10000;
var TOTAL_MS = PHASE1_MS + PHASE2_MS;

var state = 'idle'; // idle | phase1 | phase2 | done
var rawData = [];    // flat: [elapsed, gap, buttons, mx, my, phase, ...]
var coalData = [];   // flat: [elapsed, gap, buttons, mx, my, phase, ...]
var t0 = 0;
var tLastRaw = 0;
var tLastCoal = 0;
var phase = 0;
var savedAnalysis = '';
var tickTimer = null;
var phaseTimer1 = null;
var phaseTimer2 = null;

// Canvas drawing state (only used after capture)
var canvasDrawn = false;

// Restore from localStorage
(function() {
  var s = localStorage.getItem('mouseTestData3');
  if (!s) return;
  try {
    var p = JSON.parse(s);
    rawData = p.rawData || [];
    coalData = p.coalData || [];
    savedAnalysis = p.analysis || '';
    if (rawData.length > 0) {
      state = 'done';
      statusEl.textContent = 'RESTORED — ' + (rawData.length / 6) + ' raw, ' + (coalData.length / 6) + ' coalesced';
      statusEl.style.color = '#0af';
      copyBtn.style.display = 'inline-block';
      resetBtn.style.display = 'inline-block';
      if (savedAnalysis) {
        analysisEl.style.display = 'block';
        analysisEl.textContent = savedAnalysis;
      }
      drawCanvas();
    }
  } catch (e) {}
})();

document.addEventListener('click', function() {
  if (state !== 'idle') return;
  document.body.requestPointerLock();
});

document.addEventListener('pointerlockchange', function() {
  if (document.pointerLockElement) {
    startCapture();
  } else if (state === 'phase1' || state === 'phase2') {
    finishCapture();
  }
});

function startCapture() {
  rawData = [];
  coalData = [];
  t0 = performance.now();
  tLastRaw = 0;
  tLastCoal = 0;
  phase = 1;
  state = 'phase1';
  canvasDrawn = false;
  copyBtn.style.display = 'none';
  resetBtn.style.display = 'none';
  analysisEl.style.display = 'none';
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  statusEl.textContent = 'PHASE 1 — Move mouse WITHOUT pressing button';
  statusEl.style.color = '#0f0';
  timerEl.textContent = 'NO tick timer — testing idle throttle hypothesis';

  // DELIBERATELY no setInterval here — testing if the browser throttles
  // pointer lock events when the page has no active timers/intervals.

  phaseTimer1 = setTimeout(function() {
    phase = 2;
    state = 'phase2';
    statusEl.textContent = 'PHASE 2 — HOLD mouse button and keep moving';
    statusEl.style.color = '#f80';
  }, PHASE1_MS);

  phaseTimer2 = setTimeout(function() {
    document.exitPointerLock();
  }, TOTAL_MS);
}

function updateTick() {
  if (state !== 'phase1' && state !== 'phase2') return;
  var elapsed = performance.now() - t0;
  var remaining;
  if (state === 'phase1') {
    remaining = Math.max(0, (PHASE1_MS - elapsed) / 1000);
    timerEl.textContent = 'Phase 1: ' + remaining.toFixed(1) + 's remaining — DO NOT press button';
  } else {
    remaining = Math.max(0, (TOTAL_MS - elapsed) / 1000);
    timerEl.textContent = 'Phase 2: ' + remaining.toFixed(1) + 's remaining — HOLD button down';
  }
}

function finishCapture() {
  state = 'done';
  clearTimeout(phaseTimer1);
  clearTimeout(phaseTimer2);

  var rn = rawData.length / 6;
  var cn = coalData.length / 6;
  statusEl.textContent = 'DONE — ' + rn + ' raw, ' + cn + ' coalesced. Analysing...';
  statusEl.style.color = '#ff0';
  timerEl.textContent = '';
  copyBtn.style.display = 'inline-block';
  resetBtn.style.display = 'inline-block';

  setTimeout(function() {
    runAnalysis();
    drawCanvas();
    try {
      localStorage.setItem('mouseTestData3', JSON.stringify({ rawData: rawData, coalData: coalData, analysis: savedAnalysis }));
    } catch (e) {}
    statusEl.textContent = 'DONE — ' + rn + ' raw, ' + cn + ' coalesced. Copy or Reset.';
  }, 50);
}

// Zero-overhead capture: just push numbers
document.addEventListener('pointermove', function(e) {
  if (state !== 'phase1' && state !== 'phase2') return;
  var now = performance.now();
  var p = phase;

  rawData.push(now - t0, tLastRaw ? now - tLastRaw : 0, e.buttons, e.movementX, e.movementY, p);
  tLastRaw = now;

  var coalesced = e.getCoalescedEvents ? e.getCoalescedEvents() : [e];
  for (var i = 0; i < coalesced.length; i++) {
    var ce = coalesced[i];
    coalData.push(now - t0, tLastCoal ? now - tLastCoal : 0, ce.buttons, ce.movementX, ce.movementY, p);
    tLastCoal = now;
  }
});

resetBtn.addEventListener('click', function(ev) {
  ev.stopPropagation();
  rawData = [];
  coalData = [];
  savedAnalysis = '';
  state = 'idle';
  canvasDrawn = false;
  localStorage.removeItem('mouseTestData3');
  analysisEl.style.display = 'none';
  copyBtn.style.display = 'none';
  resetBtn.style.display = 'none';
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  statusEl.textContent = 'Click the box to start';
  statusEl.style.color = '#ff0';
  timerEl.textContent = '';
});

// --- Drawing ---
function drawCanvas() {
  if (canvasDrawn) return;
  canvasDrawn = true;
  var W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  var rn = rawData.length / 6;
  var cn = coalData.length / 6;
  if (rn === 0) return;

  var maxT = Math.max(rawData[(rn - 1) * 6], TOTAL_MS);
  var halfH = H / 2;

  // Phase divider
  var phaseX = (PHASE1_MS / maxT) * W;
  ctx.strokeStyle = '#ff0';
  ctx.lineWidth = 2;
  ctx.setLineDash([6, 4]);
  ctx.beginPath(); ctx.moveTo(phaseX, 0); ctx.lineTo(phaseX, H); ctx.stroke();
  ctx.setLineDash([]);

  // Labels
  ctx.fillStyle = '#888';
  ctx.font = '11px monospace';
  ctx.fillText('RAW pointermove', 6, 14);
  ctx.fillText('getCoalescedEvents()', 6, halfH + 14);
  ctx.fillText('Phase 1 (no button)', phaseX - 160, 14);
  ctx.fillText('Phase 2 (button held)', phaseX + 6, 14);

  // Divider between raw and coalesced
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, halfH); ctx.lineTo(W, halfH); ctx.stroke();

  // Draw raw gaps as vertical ticks (top half)
  drawGaps(rawData, rn, 0, halfH - 20, maxT, '#0f0', '#f44');

  // Draw coalesced gaps (bottom half)
  drawGaps(coalData, cn, halfH, halfH - 20, maxT, '#08f', '#f80');
}

function drawGaps(dataArr, count, yBase, yHeight, maxT, goodColor, badColor) {
  var W = canvas.width;
  for (var i = 0; i < count; i++) {
    var o = i * 6;
    var t = dataArr[o];
    var gap = dataArr[o + 1];
    var x = (t / maxT) * W;
    var h = Math.min(gap / 5, yHeight);
    ctx.fillStyle = gap > 25 ? badColor : goodColor;
    ctx.fillRect(x, yBase + yHeight - h + 20, 1.5, h);
  }
}

// --- Analysis ---
function getRaw(i) { var o = i * 6; return { t: rawData[o], g: rawData[o+1], btn: rawData[o+2], mx: rawData[o+3], my: rawData[o+4], p: rawData[o+5] }; }
function getCoal(i) { var o = i * 6; return { t: coalData[o], g: coalData[o+1], btn: coalData[o+2], mx: coalData[o+3], my: coalData[o+4], p: coalData[o+5] }; }

function calcStats(arr) {
  if (!arr.length) return { count: 0, mean: 0, median: 0, min: 0, max: 0, stddev: 0, p95: 0, p99: 0 };
  var s = arr.slice().sort(function(a, b) { return a - b; });
  var sum = 0;
  for (var i = 0; i < arr.length; i++) sum += arr[i];
  var m = sum / arr.length;
  var v = 0;
  for (var i = 0; i < arr.length; i++) v += (arr[i] - m) * (arr[i] - m);
  return { count: arr.length, mean: m, median: s[Math.floor(s.length/2)], min: s[0], max: s[s.length-1], stddev: Math.sqrt(v/arr.length), p95: s[Math.floor(s.length*0.95)], p99: s[Math.floor(s.length*0.99)] };
}

function fS(s) {
  return 'n=' + s.count + '  mean=' + s.mean.toFixed(2) + '  med=' + s.median.toFixed(2) + '  min=' + s.min.toFixed(2) + '  max=' + s.max.toFixed(2) + '  sd=' + s.stddev.toFixed(2) + '  p95=' + s.p95.toFixed(2) + '  p99=' + s.p99.toFixed(2);
}

function pad(v, n) { var s = '' + v; while (s.length < n) s = ' ' + s; return s; }

function analysePhase(label, getData, total, phaseNum) {
  var gaps = [], mags = [], count = 0;
  for (var i = 0; i < total; i++) {
    var ev = getData(i);
    if (ev.p !== phaseNum) continue;
    count++;
    if (ev.g > 0) gaps.push(ev.g);
    mags.push(Math.sqrt(ev.mx * ev.mx + ev.my * ev.my));
  }
  return { label: label, count: count, gaps: gaps, mags: mags, gStats: calcStats(gaps), mStats: calcStats(mags) };
}

function runAnalysis() {
  var rn = rawData.length / 6;
  var cn = coalData.length / 6;

  var rawP1 = analysePhase('Raw P1 (no btn)', getRaw, rn, 1);
  var rawP2 = analysePhase('Raw P2 (btn held)', getRaw, rn, 2);
  var coalP1 = analysePhase('Coalesced P1 (no btn)', getCoal, cn, 1);
  var coalP2 = analysePhase('Coalesced P2 (btn held)', getCoal, cn, 2);

  var L = [];
  L.push('═══════════════════════════════════════════════════════════════════');
  L.push('  MOUSE JANK TEST — Raw vs getCoalescedEvents()');
  L.push('  ' + new Date().toISOString());
  L.push('  Phase 1: no button (10s), Phase 2: button held (10s)');
  L.push('  Raw events: ' + rn + '  |  Coalesced events: ' + cn + '  |  Ratio: ' + (cn / Math.max(rn, 1)).toFixed(2) + 'x');
  L.push('═══════════════════════════════════════════════════════════════════');
  L.push('');

  L.push('── EVENT RATES ─────────────────────────────────────────────────');
  L.push('  Raw      P1: ' + rawP1.count + ' events (' + (rawP1.count / 10).toFixed(1) + '/s)  |  P2: ' + rawP2.count + ' events (' + (rawP2.count / 10).toFixed(1) + '/s)');
  L.push('  Coalesced P1: ' + coalP1.count + ' events (' + (coalP1.count / 10).toFixed(1) + '/s)  |  P2: ' + coalP2.count + ' events (' + (coalP2.count / 10).toFixed(1) + '/s)');
  L.push('  P1 improvement: ' + rawP1.count + ' → ' + coalP1.count + ' (' + (coalP1.count / Math.max(rawP1.count, 1)).toFixed(2) + 'x)');
  L.push('  P2 improvement: ' + rawP2.count + ' → ' + coalP2.count + ' (' + (coalP2.count / Math.max(rawP2.count, 1)).toFixed(2) + 'x)');
  L.push('');

  L.push('── GAPS (ms, lower = smoother) ──────────────────────────────────');
  L.push('  Raw P1:       ' + fS(rawP1.gStats));
  L.push('  Coalesced P1: ' + fS(coalP1.gStats));
  L.push('  Raw P2:       ' + fS(rawP2.gStats));
  L.push('  Coalesced P2: ' + fS(coalP2.gStats));
  L.push('');

  L.push('── MOVEMENT (px per event) ─────────────────────────────────────');
  L.push('  Raw P1:       ' + fS(rawP1.mStats));
  L.push('  Coalesced P1: ' + fS(coalP1.mStats));
  L.push('  Raw P2:       ' + fS(rawP2.mStats));
  L.push('  Coalesced P2: ' + fS(coalP2.mStats));
  L.push('');

  L.push('── JANK ────────────────────────────────────────────────────────');
  L.push('  Raw P1:       ' + rawP1.gaps.filter(function(g){return g>25}).length + ' >25ms  |  ' + rawP1.gaps.filter(function(g){return g>50}).length + ' >50ms');
  L.push('  Coalesced P1: ' + coalP1.gaps.filter(function(g){return g>25}).length + ' >25ms  |  ' + coalP1.gaps.filter(function(g){return g>50}).length + ' >50ms');
  L.push('  Raw P2:       ' + rawP2.gaps.filter(function(g){return g>25}).length + ' >25ms  |  ' + rawP2.gaps.filter(function(g){return g>50}).length + ' >50ms');
  L.push('  Coalesced P2: ' + coalP2.gaps.filter(function(g){return g>25}).length + ' >25ms  |  ' + coalP2.gaps.filter(function(g){return g>50}).length + ' >50ms');
  L.push('');

  // Histogram
  var buckets = [0, 2, 4, 8, 16, 25, 50, 100, 200];
  L.push('── GAP HISTOGRAM ───────────────────────────────────────────────');
  L.push('  Range(ms)   RawP1    CoalP1   RawP2    CoalP2');
  for (var b = 0; b < buckets.length; b++) {
    var lo = buckets[b], hi = b < buckets.length - 1 ? buckets[b + 1] : Infinity;
    var lbl = hi === Infinity ? (lo + '+') : (lo + '-' + hi);
    while (lbl.length < 10) lbl += ' ';
    function cnt(arr, lo, hi) { return arr.filter(function(g){ return g >= lo && g < hi; }).length; }
    L.push('  ' + lbl + pad(cnt(rawP1.gaps,lo,hi),7) + pad(cnt(coalP1.gaps,lo,hi),9) + pad(cnt(rawP2.gaps,lo,hi),9) + pad(cnt(coalP2.gaps,lo,hi),9));
  }
  L.push('');

  L.push('── VERDICT ─────────────────────────────────────────────────────');
  if (coalP1.count > rawP1.count * 1.5) {
    L.push('  ✓ getCoalescedEvents() recovers ' + (coalP1.count / Math.max(rawP1.count, 1)).toFixed(1) + 'x more events in Phase 1');
    L.push('  ✓ Mean gap improved: ' + rawP1.gStats.mean.toFixed(1) + 'ms → ' + coalP1.gStats.mean.toFixed(1) + 'ms');
    L.push('  → USE getCoalescedEvents() to fix the jank!');
  } else if (coalP1.count <= rawP1.count) {
    L.push('  ✗ getCoalescedEvents() did NOT recover extra Phase 1 events');
    L.push('    (' + coalP1.count + ' coalesced vs ' + rawP1.count + ' raw)');
    L.push('  → Browser is NOT coalescing; throttle is at OS/driver level.');
  } else {
    L.push('  ~ Marginal improvement: ' + coalP1.count + ' coalesced vs ' + rawP1.count + ' raw in Phase 1');
  }
  L.push('═══════════════════════════════════════════════════════════════════');

  savedAnalysis = L.join('\n');
  analysisEl.style.display = 'block';
  analysisEl.textContent = savedAnalysis;
}

copyBtn.addEventListener('click', function(ev) {
  ev.stopPropagation();
  var rn = rawData.length / 6;
  var cn = coalData.length / 6;
  var lines = [
    '# Mouse Jank Test — ' + new Date().toISOString(),
    '# Phase 1: no button (10s), Phase 2: button held (10s)',
    '',
    '# RAW pointermove events',
    '# n,elapsedMs,gapMs,btn,movX,movY,phase'
  ];
  for (var i = 0; i < rn; i++) {
    var e = getRaw(i);
    lines.push((i+1) + ',' + e.t.toFixed(1) + ',' + e.g.toFixed(1) + ',' + (e.btn === 0 ? 'UP' : 'DOWN') + ',' + e.mx + ',' + e.my + ',' + e.p);
  }
  lines.push('');
  lines.push('# COALESCED events (via getCoalescedEvents())');
  lines.push('# n,elapsedMs,gapMs,btn,movX,movY,phase');
  for (var i = 0; i < cn; i++) {
    var e = getCoal(i);
    lines.push((i+1) + ',' + e.t.toFixed(1) + ',' + e.g.toFixed(1) + ',' + (e.btn === 0 ? 'UP' : 'DOWN') + ',' + e.mx + ',' + e.my + ',' + e.p);
  }
  lines.push('');
  lines.push(savedAnalysis);
  navigator.clipboard.writeText(lines.join('\n')).then(function() {
    copyBtn.textContent = 'Copied!';
    setTimeout(function() { copyBtn.textContent = 'Copy Full Log + Analysis'; }, 2000);
  });
});
</script>
</body>
</html>
